<!--
# 文件说明书 (Folder Manual Template)
## 核心功能 (Core Function)
为 Web UI 与侧边栏标题区域提供透明背景的圆环矢量图标，保证浏览器 favicon 与品牌入口图形统一。

## 输入 (Input)
输入来自 `icons/icon-source.svg` 的圆环主视觉定义，以及浏览器对 SVG favicon 的加载要求。

## 输出 (Output)
输出可直接被浏览器读取的透明 SVG favicon，并作为 PNG/ICO 导出的视觉参考。

## 定位 (Position)
该文件位于 public 静态资源目录，是 Web 端品牌图标的 SVG 入口。

## 依赖 (Dependency)
- `icons/icon-source.svg` 提供统一的图形结构与配色参考
- `sidepanel.js` 在运行时引用 `/favicon.svg` 作为品牌图标资源
- `favicon-32.png` 与 `favicon.ico` 复用同一视觉系统做多格式兼容

## 维护规则 (Maintenance Rules)
1. 每次修改代码逻辑后，必须检查并更新上述的【核心功能】、【输入】、【输出】等信息，确保文档与代码一致。
2. 禁止修改或删除本【维护规则】章节的内容。
3. 修改完成后，必须扫描当前文件所在的文件夹目录，找到对应的 [当前文件夹名称]_README.md 文档，并同步更新该 README 中关于本文件的描述信息。
-->
