<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw Pilot 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #f0f0f5;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: #e2e2e8;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: rgba(124, 58, 237, 0.6);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }
    input::placeholder {
      color: rgba(255,255,255,0.25);
    }
    .hint {
      font-size: 11px;
      color: #707080;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
    }
    button {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save {
      background: rgba(124, 58, 237, 0.85);
      color: #fff;
    }
    .btn-save:hover {
      background: rgba(124, 58, 237, 1);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
    }
    .btn-save:active {
      transform: scale(0.97);
    }
    .status {
      font-size: 13px;
      color: #10b981;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>OpenClaw Pilot 设置</h1>
    <div class="field">
      <label for="token">网关 Token (Gateway Token)</label>
      <input type="text" id="token" placeholder="输入网关认证 Token" autocomplete="off" spellcheck="false">
      <div class="hint">用于连接本地 OpenClaw Relay 服务的认证凭据</div>
    </div>
    <div class="field">
      <label for="port">Relay 端口</label>
      <input type="number" id="port" placeholder="18792" min="1" max="65535">
      <div class="hint">本地 Relay 服务端口，默认 18792</div>
    </div>
    <div class="actions">
      <button class="btn-save" id="save">保存</button>
      <span class="status" id="status">已保存</span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
