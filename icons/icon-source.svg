<!--
# 文件说明书 (Folder Manual Template)
## 核心功能 (Core Function)
提供扩展与网页图标的统一矢量主稿，使用透明背景的圆环图形表达品牌入口图标。

## 输入 (Input)
图标系统需要的品牌配色与尺寸导出需求，当前以深色外环、青蓝主环、橙色 claw accent 组成。

## 输出 (Output)
输出可被导出为 16/32/48/128/180 等尺寸的高质量 PNG/ICO，以及可直接被网页使用的 SVG 图标。

## 定位 (Position)
该文件是 icons 目录中的图标源文件，负责承载唯一的可编辑矢量版本，供其他位图资源派生。

## 依赖 (Dependency)
- `manifest.json` 使用导出的 PNG 作为扩展图标入口
- `src/openclaw/ui/public/favicon.svg` 复用同一视觉语言作为网页 favicon
- `assets/icon128-BTAbtSSb.png` 作为侧边栏品牌图的位图版本

## 维护规则 (Maintenance Rules)
1. 每次修改代码逻辑后，必须检查并更新上述的【核心功能】、【输入】、【输出】等信息，确保文档与代码一致。
2. 禁止修改或删除本【维护规则】章节的内容。
3. 修改完成后，必须扫描当前文件所在的文件夹目录，找到对应的 [当前文件夹名称]_README.md 文档，并同步更新该 README 中关于本文件的描述信息。
-->
